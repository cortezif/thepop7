services:
  postgres:
    # Imagem oficial do pgvector já com PG 16 + extensão vector instalada.
    # Alinhado com adviser-editor (também usa pgvector).
    image: pgvector/pgvector:pg16
    container_name: thepop-pg
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       thepop
    ports:
      - "5432:5432"
    volumes:
      - thepop-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: thepop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  thepop-pg-data:
